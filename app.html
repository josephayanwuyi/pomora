<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomora - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
</head>

<body>

    <div class="container-head">
        <header class="navbar" role="banner">
            <div class="logo"><span class="logo-icon"><i class="fa-regular fa-clock"></i></span> Pomora</div>
            <nav class="nav-actions" aria-label="Primary navigation">
                <button type="button" class="nav-btn">
                    <span class="icon"><i class="fa fa-bar-chart" aria-hidden="true"></i></span>
                    <span class="icon_text">Report</span>
                </button>
                <button type="button" class="nav-btn">
                    <span class="icon"><i class="fa fa-cog" aria-hidden="true"></i></span>
                    <span class="icon_text">Setting</span>
                </button>
                <button type="button" class="nav-btn login-btn">
                    <span class="icon"><i class="fa fa-user-circle" aria-hidden="true"></i></span>
                    <span class="icon_text">Sign In</span>
                </button>
                <button type="button" class="more-btn" aria-label="More options">
                    ⋮
                </button>
            </nav>
        </header>

        <div class="progress-bar-bg" aria-hidden="true"></div>

        <main id="main-content" class="main-container">
            <section class="timer-card" aria-labelledby="timer-heading">
                <div class="timer-modes" role="tablist" aria-label="Timer mode">
                    <button type="button" class="mode-btn active" aria-selected="true">
                        Pomodoro
                    </button>
                    <button type="button" class="mode-btn">Short Break</button>
                    <button type="button" class="mode-btn">Long Break</button>
                </div>

                <div id="timer-heading" class="timer-display" role="status" aria-live="polite">
                    25:00
                </div>

                <button type="button" class="start-btn">START</button>
            </section>

            <div class="task-status">
                <span class="task-number">#2</span>
                <p class="task-message">Time to focus!</p>
            </div>

            <section class="tasks-section" aria-labelledby="tasks-heading">
                <div class="tasks-header">
                    <h2 id="tasks-heading">Tasks</h2>
                    <button type="button" class="more-btn-v" aria-label="More task options">
                        ⋮
                    </button>
                </div>

                <button type="button" class="add-task-btn">
                    <span class="plus-icon" aria-hidden="true">+</span>
                    Add Task
                </button>
            </section>
        </main>
    </div>
</body>
<script src="js/app.js"></script>
</html>
